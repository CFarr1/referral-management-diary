<!doctype html>
<html>
  <head>
    <title>{{ title }} – Health matters</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/calendar.css" />
  </head>

  <body>
    <header class="top-bar">
      <div class="top-bar-main">
        <div class="top-bar-brand">
          <img src="/static/ULAN Crest.png" alt="ULAN Crest" class="logo-img" />
          <h1>Health matters</h1>
        </div>
        <div class="top-bar-actions">
          <div class="search-box">
            <input type="text" placeholder="" aria-label="Search" />
            <button class="search-btn" aria-label="Submit search">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
            </button>
          </div>
          <a href="/logout" class="account-btn">
            <span class="account-btn-label">Logout</span>
            <div class="account-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
          </a>
        </div>
      </div>
      <nav class="top-bar-nav">
        <a href="/self-referrals" class="nav-link {% if active == 'self-referrals' %}nav-link-active{% endif %}">Self referrals</a>
        <a href="/advice-sheets" class="nav-link {% if active == 'advice-sheets' %}nav-link-active{% endif %}">Advice sheets</a>
        <a href="/notifications" class="nav-link {% if active == 'notifications' %}nav-link-active{% endif %}">Notifications</a>
        <a href="/calendar" class="nav-link {% if active == 'calendar' %}nav-link-active{% endif %}">Upcoming appointments</a>
      </nav>
    </header>

    <div class="page-title">
      <h2>{{ title }}</h2>
    </div>

    <div class="content-area">
      <div class="placeholder-body">
        <div class="placeholder-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#196082" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="9" y1="21" x2="9" y2="9"/>
          </svg>
        </div>
        <h3 class="placeholder-heading">{{ title }} is coming soon</h3>
        <p class="placeholder-sub">This section hasn't been built yet. Check back later.</p>
        <a href="/calendar" class="placeholder-back-btn">Back to calendar</a>
      </div>
    </div>
  </body>
</html>
