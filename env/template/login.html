<!doctype html>
<html>
  <head>
    <title>Login – Health matters</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #e8f2f7;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }

      .card {
        display: flex;
        width: 780px;
        max-width: 96vw;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 12px 48px rgba(0,0,0,0.18);
      }

      /* ── Left panel ── */
      .panel-left {
        flex: 1;
        background: white;
        padding: 2.5rem 2.25rem;
        display: flex;
        flex-direction: column;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 2rem;
      }

      .brand img {
        width: 40px;
        height: 40px;
        object-fit: contain;
      }

      .brand-name {
        font-size: 1.3rem;
        font-weight: 800;
        color: #196082;
        letter-spacing: -0.02em;
        text-transform: uppercase;
      }

      .panel-left h2 {
        font-size: 1.35rem;
        font-weight: 600;
        color: #1a1a1a;
        margin-bottom: 1.75rem;
      }

      .error-msg {
        background: #fde8e8;
        border-left: 4px solid #c0392b;
        color: #c0392b;
        font-size: 0.85rem;
        padding: 0.6rem 0.85rem;
        border-radius: 4px;
        margin-bottom: 1rem;
        display: {% if error %}block{% else %}none{% endif %};
      }

      .field {
        margin-bottom: 1rem;
      }

      .field input {
        width: 100%;
        padding: 0.7rem 0.9rem;
        border: 1.5px solid #d0d0d0;
        border-radius: 8px;
        font-size: 0.95rem;
        color: #222;
        outline: none;
        transition: border-color 0.15s;
        background: #fafafa;
      }

      .field input::placeholder { color: #aaa; }
      .field input:focus { border-color: #196082; background: white; }

      .password-wrap {
        position: relative;
      }

      .password-wrap input { padding-right: 2.5rem; }

      .toggle-pw {
        position: absolute;
        right: 0.75rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #888;
        padding: 0;
        display: flex;
      }

      .toggle-pw:hover { color: #196082; }

      .forgot {
        display: block;
        text-align: right;
        font-size: 0.8rem;
        color: #196082;
        text-decoration: none;
        margin-top: -0.4rem;
        margin-bottom: 1.4rem;
      }

      .forgot:hover { text-decoration: underline; }

      .btn-signin {
        width: 100%;
        padding: 0.75rem;
        background: #196082;
        color: white;
        font-size: 1rem;
        font-weight: 700;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s;
        letter-spacing: 0.02em;
      }

      .btn-signin:hover { background: #134e6a; }

      .support-link {
        margin-top: auto;
        padding-top: 1.5rem;
        text-align: center;
        font-size: 0.8rem;
        color: #196082;
        text-decoration: none;
      }

      .support-link:hover { text-decoration: underline; }

      /* ── Right panel ── */
      .panel-right {
        width: 260px;
        flex-shrink: 0;
        background: #196082;
        padding: 2.5rem 1.75rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        position: relative;
        overflow: hidden;
      }

      .panel-right::before {
        content: '';
        position: absolute;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: rgba(255,255,255,0.05);
        bottom: -80px;
        right: -80px;
      }

      .panel-right::after {
        content: '';
        position: absolute;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: rgba(255,255,255,0.05);
        top: -50px;
        left: -50px;
      }

      .panel-right h3 {
        font-size: 1.2rem;
        font-weight: 800;
        color: white;
        text-align: center;
        position: relative;
        z-index: 1;
      }

      .panel-right p {
        font-size: 0.82rem;
        color: rgba(255,255,255,0.75);
        text-align: center;
        line-height: 1.5;
        position: relative;
        z-index: 1;
      }

      .btn-get-started {
        background: white;
        color: #196082;
        font-weight: 700;
        font-size: 0.9rem;
        border: none;
        border-radius: 8px;
        padding: 0.65rem 1.5rem;
        cursor: pointer;
        position: relative;
        z-index: 1;
        transition: background 0.15s, color 0.15s;
      }

      .btn-get-started:hover {
        background: #e8f2f7;
      }

      /* ── Mobile ── */
      @media (max-width: 600px) {
        .panel-right { display: none; }
        .panel-left { padding: 2rem 1.5rem; }
        .card { border-radius: 12px; }
      }
    </style>
  </head>
  <body>
    <div class="card">

      <!-- Left: login form -->
      <div class="panel-left">
        <div class="brand">
          <img src="/static/ULAN Crest.png" alt="ULAN Crest" />
          <span class="brand-name">Health matters</span>
        </div>

        <h2>Login to Your Account</h2>

        <div class="error-msg" id="error-msg">
          {% if error %}{{ error }}{% endif %}
        </div>

        <form method="POST" action="/login">
          <div class="field">
            <input type="text" name="username" placeholder="Username" autocomplete="username" required />
          </div>
          <div class="field">
            <div class="password-wrap">
              <input type="password" name="password" id="pw-input" placeholder="Password" autocomplete="current-password" required />
              <button type="button" class="toggle-pw" onclick="togglePw()" aria-label="Show password">
                <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <a href="#" class="forgot">Forgot Password?</a>
          <button type="submit" class="btn-signin">Sign In</button>
        </form>

        <a href="#" class="support-link">Contact Support</a>
      </div>

      <!-- Right: new user panel -->
      <div class="panel-right">
        <h3>New Here?</h3>
        <p>Create an account and discover a great amount of new opportunities</p>
        <button class="btn-get-started">Get Started</button>
      </div>

    </div>

    <script>
      function togglePw() {
        const input = document.getElementById('pw-input');
        input.type = input.type === 'password' ? 'text' : 'password';
      }

      // Show error if present
      const err = document.getElementById('error-msg');
      if (err && err.textContent.trim()) err.style.display = 'block';
    </script>
  </body>
</html>
