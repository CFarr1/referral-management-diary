<!DOCTYPE html>
<html>
<head>
  <title>Users</title>
  <style>
    table {
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #444;
      padding: 6px 10px;
    }
  </style>
</head>
<body>

<h1>User List</h1>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Email</th>
    </tr>
  </thead>
  <tbody>
    {% for user in users %}
      <tr>
        <td>{{ user.id or user["id"] }}</td>
        <td>{{ user.name or user["name"] }}</td>
        <td>{{ user.email or user["email"] }}</td>
      </tr>
    {% endfor %}
  </tbody>
</table>

</body>
</html>
